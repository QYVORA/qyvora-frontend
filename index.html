<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    
    <!-- Force exact color rendering on all devices -->
    <meta name="theme-color" content="#66B870" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#66B870" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#050706" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="msapplication-navbutton-color" content="#66B870" />
    
    <!-- Disable iOS color adjustment -->
    <meta name="format-detection" content="telephone=no" />
    <style>
      /* Critical CSS to prevent color shifts before main CSS loads */
      :root {
        --color-accent: #66B870;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color-adjust: exact;
      }
    </style>

    <title>QYVORA | Africa's Offensive Security Platform</title>
    <meta name="description" content="Building a strong cybersecurity ecosystem in Africa through offensive security training, penetration testing, and advanced intelligence tools." />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="author" href="/humans.txt" />
    <meta name="msapplication-TileImage" content="/favicon.png" />
    <meta name="msapplication-TileColor" content="#66B870" />

    <!-- Performance: DNS prefetch + preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://chat.whatsapp.com" />
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/src/app/main.tsx" as="script" />
    <link rel="preload" href="/qyvora-full-logo.webp" as="image" />

    <!-- Open Graph Fallback -->
    <meta property="og:site_name" content="QYVORA" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="/qyvora-full-logo.png" />
    
    <!-- Twitter Fallback -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@QYVORASEC" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
