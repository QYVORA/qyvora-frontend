<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- Disable iOS color adjustment -->
    <meta name="format-detection" content="telephone=no" />
    <style>
      /* Critical CSS to prevent color shifts before main CSS loads */
      :root {
        --color-accent: #06B66F;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color-adjust: exact;
      }
    </style>

    <title>QYVORA | Africa's Offensive Security Platform</title>
    <meta name="description" content="Building a strong cybersecurity ecosystem in Africa through offensive security training, penetration testing, and advanced intelligence tools." />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="author" href="/humans.txt" />
    <link rel="shortcut icon" href="/favicon.png" />
    <meta name="msapplication-TileImage" content="/favicon.png" />
    <meta name="msapplication-TileColor" content="#06B66F" />

    <!-- Performance: DNS prefetch -->
    <link rel="preconnect" href="https://chat.whatsapp.com" />
    
    <!-- Open Graph Fallback -->
    <meta property="og:site_name" content="QYVORA" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="QYVORA | Africa's Offensive Security Platform" />
    <meta property="og:description" content="Building a strong cybersecurity ecosystem in Africa through offensive security training, penetration testing, and advanced intelligence tools." />
    <meta property="og:image" content="https://qyvora.netlify.app/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://qyvora.netlify.app" />
    
    <!-- Twitter Fallback -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@qyvorasec" />
    <meta name="twitter:title" content="QYVORA | Africa's Offensive Security Platform" />
    <meta name="twitter:description" content="Building a strong cybersecurity ecosystem in Africa through offensive security training, penetration testing, and advanced intelligence tools." />
    <meta name="twitter:image" content="https://qyvora.netlify.app/og-image.svg" />
  </head>
  <body>
    <div id="root">
      <!-- Thin progress bar shown while JS bundles load -->
      <div id="initial-loader" style="position:fixed;top:0;left:0;width:100%;height:3px;z-index:9999;background:rgba(171,181,192,0.12);overflow:hidden">
        <style>
          #initial-loader .bar { height:100%;background:#06B66F;width:0%;animation:loader-progress 2s ease-out forwards; }
          @keyframes loader-progress { 0%{width:0%} 20%{width:30%} 50%{width:60%} 80%{width:85%} 100%{width:95%} }
        </style>
        <div class="bar"></div>
      </div>
    </div>
    <script type="module" src="/src/app/main.tsx"></script>
    <script type="module" src="/src/prerender.tsx" prerender></script>
  </body>
</html>
