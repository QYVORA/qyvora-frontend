<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc33;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#00ff41" stroke-width="0.5" fill="none">
    <line x1="0" y1="0" x2="0" y2="630" />
    <line x1="60" y1="0" x2="60" y2="630" />
    <line x1="120" y1="0" x2="120" y2="630" />
    <line x1="180" y1="0" x2="180" y2="630" />
    <line x1="240" y1="0" x2="240" y2="630" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="360" y1="0" x2="360" y2="630" />
    <line x1="420" y1="0" x2="420" y2="630" />
    <line x1="480" y1="0" x2="480" y2="630" />
    <line x1="540" y1="0" x2="540" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="660" y1="0" x2="660" y2="630" />
    <line x1="720" y1="0" x2="720" y2="630" />
    <line x1="780" y1="0" x2="780" y2="630" />
    <line x1="840" y1="0" x2="840" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
    <line x1="960" y1="0" x2="960" y2="630" />
    <line x1="1020" y1="0" x2="1020" y2="630" />
    <line x1="1080" y1="0" x2="1080" y2="630" />
    <line x1="1140" y1="0" x2="1140" y2="630" />
    <line x1="1200" y1="0" x2="1200" y2="630" />
    <line x1="0" y1="0" x2="1200" y2="0" />
    <line x1="0" y1="63" x2="1200" y2="63" />
    <line x1="0" y1="126" x2="1200" y2="126" />
    <line x1="0" y1="189" x2="1200" y2="189" />
    <line x1="0" y1="252" x2="1200" y2="252" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="378" x2="1200" y2="378" />
    <line x1="0" y1="441" x2="1200" y2="441" />
    <line x1="0" y1="504" x2="1200" y2="504" />
    <line x1="0" y1="567" x2="1200" y2="567" />
  </g>

  <!-- Circuit lines left -->
  <g stroke="#00ff41" stroke-width="1" fill="none" opacity="0.15">
    <path d="M0,200 L80,200 L80,160 L120,160" />
    <path d="M0,220 L60,220 L60,260 L100,260 L100,240" />
    <circle cx="120" cy="160" r="3" fill="#00ff41" />
    <path d="M0,350 L50,350 L50,380 L90,380 L90,360 L130,360" />
    <circle cx="130" cy="360" r="3" fill="#00ff41" />
    <path d="M0,440 L70,440 L70,420 L110,420" />
    <circle cx="110" cy="420" r="3" fill="#00ff41" />
  </g>

  <!-- Circuit lines right -->
  <g stroke="#00ff41" stroke-width="1" fill="none" opacity="0.15">
    <path d="M1200,180 L1120,180 L1120,220 L1080,220" />
    <circle cx="1080" cy="220" r="3" fill="#00ff41" />
    <path d="M1200,320 L1140,320 L1140,300 L1100,300 L1100,340 L1060,340" />
    <circle cx="1060" cy="340" r="3" fill="#00ff41" />
    <path d="M1200,450 L1130,450 L1130,470 L1090,470" />
    <circle cx="1090" cy="470" r="3" fill="#00ff41" />
  </g>

  <!-- Binary pattern top -->
  <g font-family="monospace" font-size="10" fill="#00ff41" opacity="0.06">
    <text x="100" y="40">01001000 01100101 01101100 01101100 01101111</text>
    <text x="300" y="55">10110011 01001010 11010110 01010101 10101010</text>
    <text x="150" y="600">11001010 01010011 10100110 01101001 11010110</text>
    <text x="500" y="615">01100101 10010110 01101100 10110010 01001010</text>
  </g>

  <!-- Shield / hexagon icon -->
  <g transform="translate(600, 220)" filter="url(#glow)">
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.8" />
    <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.4" />
    <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#00ff41">Q</text>
  </g>

  <!-- Brand name -->
  <text x="600" y="330" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="12" filter="url(#glow)">
    QYVORA
  </text>

  <!-- Divider line -->
  <line x1="400" y1="355" x2="800" y2="355" stroke="#00ff41" stroke-width="1" opacity="0.4" />

  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#a0a0b0" letter-spacing="3">
    Building Africa's Cybersecurity Future
  </text>

  <!-- Subtle scan line effect -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)" opacity="0.02" />
  <g opacity="0.02">
    <rect x="0" y="0" width="1200" height="2" fill="#00ff41" />
    <rect x="0" y="4" width="1200" height="2" fill="#00ff41" />
  </g>

  <!-- Corner accents -->
  <g stroke="#00ff41" stroke-width="2" fill="none" opacity="0.3">
    <polyline points="20,40 20,20 40,20" />
    <polyline points="1160,20 1180,20 1180,40" />
    <polyline points="1180,590 1180,610 1160,610" />
    <polyline points="40,610 20,610 20,590" />
  </g>
</svg>
